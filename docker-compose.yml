services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        OFM_SERVER_URL: ${OFM_SERVER_URL}
        OFM_DEBUG: ${OFM_DEBUG}
    ports:
      - "${PORT}:5000"
    environment:
      FLASK_DEBUG: ${FLASK_DEBUG}
      LOG_LEVEL: ${LOG_LEVEL}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      RABBITMQ_URL: ${RABBITMQ_URL}
      JWT_SECRET: ${JWT_SECRET}
      OFM_ADMIN_USERNAME: ${OFM_ADMIN_USERNAME}
      OFM_ADMIN_PASSWORD: ${OFM_ADMIN_PASSWORD}
      OFM_ADMIN_TOKEN: ${OFM_ADMIN_TOKEN}
      INTEL_DECAY_DAYS: ${INTEL_DECAY_DAYS}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: python worker.py
    environment:
      LOG_LEVEL: ${LOG_LEVEL}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      RABBITMQ_URL: ${RABBITMQ_URL}
      INTEL_DECAY_DAYS: ${INTEL_DECAY_DAYS}
      PERIODIC_INTERVAL_SECONDS: ${PERIODIC_INTERVAL_SECONDS}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        OFM_DEBUG: ${OFM_DEBUG}
    ports:
      - "30000:3000"
    depends_on:
      - backend

  connector-opencti:
    build:
      context: .
      dockerfile: connectors/opencti/Dockerfile
    environment:
      LOG_LEVEL: ${LOG_LEVEL}
      RABBITMQ_URL: ${RABBITMQ_URL}
      REDIS_URL: ${REDIS_URL}
      BACKEND_URL: ${BACKEND_URL}
      OFM_ADMIN_TOKEN: ${OFM_ADMIN_TOKEN}
      CONNECTOR_CONFIG: /connectors/opencti/config.yml
    volumes:
      - ./connectors/opencti/config.yml:/connectors/opencti/config.yml:ro
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

  connector-ipinfo:
    build:
      context: .
      dockerfile: connectors/ipinfo/Dockerfile
    environment:
      LOG_LEVEL: ${LOG_LEVEL}
      RABBITMQ_URL: ${RABBITMQ_URL}
      REDIS_URL: ${REDIS_URL}
      BACKEND_URL: ${BACKEND_URL}
      OFM_ADMIN_TOKEN: ${OFM_ADMIN_TOKEN}
      CONNECTOR_CONFIG: /connectors/ipinfo/config.yml
    volumes:
      - ./connectors/ipinfo/config.yml:/connectors/ipinfo/config.yml:ro
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
