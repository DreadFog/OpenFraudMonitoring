services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ofm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ofm}
      POSTGRES_DB: ${POSTGRES_DB:-ofm}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ofm}"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-ofm}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-ofm}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        OFM_SERVER_URL: ${OFM_SERVER_URL:-}
        OFM_DEBUG: ${OFM_DEBUG:-true}
    ports:
      - "${PORT:-5000}:5000"
    environment:
      FLASK_DEBUG: ${FLASK_DEBUG:-0}
      LOG_LEVEL: ${LOG_LEVEL:-DEBUG}
      DATABASE_URL: ${DATABASE_URL:-postgresql://ofm:ofm@db:5432/ofm}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://ofm:ofm@rabbitmq:5672/}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      OFM_ADMIN_USERNAME: ${OFM_ADMIN_USERNAME:-admin}
      OFM_ADMIN_PASSWORD: ${OFM_ADMIN_PASSWORD:-admin}
      OFM_ADMIN_TOKEN: ${OFM_ADMIN_TOKEN:-dev-admin-token}
      INTEL_DECAY_DAYS: ${INTEL_DECAY_DAYS:-7}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: python worker.py
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-DEBUG}
      DATABASE_URL: ${DATABASE_URL:-postgresql://ofm:ofm@db:5432/ofm}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://ofm:ofm@rabbitmq:5672/}
      INTEL_DECAY_DAYS: ${INTEL_DECAY_DAYS:-7}
      PERIODIC_INTERVAL_SECONDS: ${PERIODIC_INTERVAL_SECONDS:-60}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        OFM_SERVER_URL: ${OFM_SERVER_URL:-}
        FPSCANNER_KEY: ${FPSCANNER_KEY:-dev-key}
        OFM_DEBUG: ${OFM_DEBUG:-true}
    ports:
      - "30000:3000"
    depends_on:
      - backend

  connector-opencti:
    build:
      context: .
      dockerfile: connectors/opencti/Dockerfile
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://ofm:ofm@rabbitmq:5672/}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      BACKEND_URL: ${BACKEND_URL:-http://backend:5000}
      OFM_ADMIN_TOKEN: ${OFM_ADMIN_TOKEN:-dev-admin-token}
      CONNECTOR_CONFIG: /connectors/opencti/config.yml
    volumes:
      - ./connectors/opencti/config.yml:/connectors/opencti/config.yml:ro
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

  connector-ipinfo:
    build:
      context: .
      dockerfile: connectors/ipinfo/Dockerfile
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://ofm:ofm@rabbitmq:5672/}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      BACKEND_URL: ${BACKEND_URL:-http://backend:5000}
      OFM_ADMIN_TOKEN: ${OFM_ADMIN_TOKEN:-dev-admin-token}
      CONNECTOR_CONFIG: /connectors/ipinfo/config.yml
    volumes:
      - ./connectors/ipinfo/config.yml:/connectors/ipinfo/config.yml:ro
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
